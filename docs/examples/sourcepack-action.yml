name: SourcePack Action Example

on:
  workflow_dispatch:
  # Enable pull_request only after reviewed trusted baseline state is committed
  # under .sourcepack/baseline.
  #
  # pull_request:
  #   types: [opened, synchronize, reopened]

# Required for normal SourcePack action use:
# - contents: read allows checkout and repository reads.
# - pull-requests: write and issues: write are only needed when comment-pr is true.
#
# On pull requests from forks, GitHub may restrict token write permissions.
# In that case SourcePack should still write artifacts and step summaries, while
# PR commenting may be skipped or recorded as failed in sourcepack-pr-comment.txt.
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sourcepack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Required when this workflow is enabled for pull_request:
      # SourcePack checks a visible repo-state transition. A clean PR checkout
      # may already contain the proposed changes as committed files, leaving no
      # local workspace delta for SourcePack to inspect.
      #
      # Keep this step enabled for pull_request events. It keeps PR files in the
      # working tree while resetting the index to the trusted base commit, making
      # the PR delta visible to SourcePack.
      - name: Materialize PR delta as workspace changes
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin ${{ github.event.pull_request.base.ref }}
          git reset --mixed ${{ github.event.pull_request.base.sha }}

      - name: Run SourcePack
        uses: ./
        with:
          mode: ci
          upload-artifact: 'true'
          sarif: 'true'
          comment-pr: 'true'
          # fail-on-warn: 'true'

      # Optional if your repository has enabled code scanning and you accept
      # uploading local SourcePack report contents.
      #
      # SARIF is only a report format. It does not change SourcePack judgment,
      # reason codes, or PASS/WARN/FAIL behavior.
      #
      # - name: Upload SourcePack SARIF
      #   if: always()
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: sourcepack-report/sourcepack.sarif.json
