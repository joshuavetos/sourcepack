[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sourcepack"
version = "1.9.8"
description = "Verifiable AI context packets from source code."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "tomli>=1.1.0; python_version < '3.11'",
]

[project.scripts]
sourcepack = "sourcepack.cli:run_cli"
