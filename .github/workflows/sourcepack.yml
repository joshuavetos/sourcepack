name: SourcePack

on:
  push:
  pull_request:

jobs:
  sourcepack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python -m pip install -e .
      - run: python -m unittest
      - run: sourcepack doctor
      - run: sourcepack demo
